<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLING.</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles/main.css?v=13">
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"
    ></script>
  </head>
  <body class="grid-bg">
    <div id="bootStatus" class="boot-status" role="status" aria-live="polite">
      <div class="boot-status__card">
        <div class="boot-status__eyebrow">SLING. / BOOT</div>
        <div id="bootStatusMessage" class="boot-status__message">Loading renderer.</div>
      </div>
    </div>

    <div id="screen-home" class="app-screen"></div>
    <div id="screen-calibration" class="app-screen"></div>
    <div id="screen-level-select" class="app-screen"></div>
    <div id="screen-gameplay" class="app-screen"></div>
    <div id="screen-level-complete" class="app-screen"></div>
    <div id="screen-level-fail" class="app-screen"></div>

    <div class="sensor-rig" aria-hidden="true">
      <video id="sensorVideo" autoplay playsinline muted></video>
    </div>

    <script type="module" src="./main.js?v=20260430-11"></script>
  </body>
</html>
